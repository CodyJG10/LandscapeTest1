---
- name: Deploy Strapi site
  hosts: strapi_servers
  become: true

  vars:
    branch: "main"
    backend_subdir: "Backend"
    site_root: "/opt/strapi-sites/{{ site_name }}"
    repo_dest: "{{ site_root }}/repo"
    backend_path: "{{ repo_dest }}/{{ backend_subdir }}"
    setup_nginx: true
    ssl_enabled: true

  handlers:
    - name: reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

  tasks:
    - name: Ensure site directory exists
      ansible.builtin.file:
        path: "{{ site_root }}"
        state: directory
        mode: "0755"

    - name: Clone or update repository
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_dest }}"
        version: "{{ branch }}"
        update: true
        force: false
        accept_hostkey: true

    # ── Backend port assignment ────────────────────────────────────────────────

    - name: Check if backend .env file exists
      ansible.builtin.stat:
        path: "{{ backend_path }}/.env"
      register: env_file

    - name: Find a free Strapi port on the VPS
      ansible.builtin.shell: |
        python3 -c "
        import socket, random
        while True:
            p = random.randint(10000, 60000)
            s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
            try:
                s.bind(('', p))
                s.close()
                print(p)
                break
            except OSError:
                pass
        "
      register: _strapi_port
      changed_when: false
      when: not env_file.stat.exists

    - name: Find a free Adminer port on the VPS
      ansible.builtin.shell: |
        python3 -c "
        import socket, random
        used = {{ _strapi_port.stdout | int }}
        while True:
            p = random.randint(10000, 60000)
            if p == used:
                continue
            s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
            try:
                s.bind(('', p))
                s.close()
                print(p)
                break
            except OSError:
                pass
        "
      register: _adminer_port
      changed_when: false
      when: not env_file.stat.exists

    - name: Set port facts for new deployment
      ansible.builtin.set_fact:
        strapi_port: "{{ _strapi_port.stdout | trim }}"
        adminer_port: "{{ _adminer_port.stdout | trim }}"
      when: not env_file.stat.exists

    - name: Read Strapi port from existing .env
      ansible.builtin.shell: "grep '^STRAPI_PORT=' {{ backend_path }}/.env | cut -d= -f2 || echo '1337'"
      register: _existing_strapi_port
      changed_when: false
      when: env_file.stat.exists

    - name: Set strapi_port fact from existing .env
      ansible.builtin.set_fact:
        strapi_port: "{{ _existing_strapi_port.stdout | trim }}"
      when: env_file.stat.exists

    # ── Frontend port assignment (must come BEFORE backend .env is written) ────
    # FRONTEND_PORT lives in Backend/.env so docker-compose can substitute it
    # in the ports: section. We determine it here for both new and re-deploys.

    - name: Check if frontend .env exists
      ansible.builtin.stat:
        path: "{{ repo_dest }}/Frontend/.env"
      register: frontend_env_file
      when: deploy_frontend_vps | default(false)

    - name: Find a free frontend port on the VPS
      ansible.builtin.shell: |
        python3 -c "
        import socket, random
        while True:
            p = random.randint(10000, 60000)
            s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
            try:
                s.bind(('', p))
                s.close()
                print(p)
                break
            except OSError:
                pass
        "
      register: _frontend_port
      changed_when: false
      when: "deploy_frontend_vps | default(false) and not (frontend_env_file.stat.exists | default(false))"

    - name: Set frontend_port fact for new deployment
      ansible.builtin.set_fact:
        frontend_port: "{{ _frontend_port.stdout | trim }}"
      when: "deploy_frontend_vps | default(false) and not (frontend_env_file.stat.exists | default(false))"

    - name: Read frontend port from existing .env
      ansible.builtin.shell: "grep '^FRONTEND_PORT=' {{ repo_dest }}/Frontend/.env | cut -d= -f2 || echo '4321'"
      register: _existing_frontend_port
      changed_when: false
      when: "deploy_frontend_vps | default(false) and (frontend_env_file.stat.exists | default(false))"

    - name: Set frontend_port fact from existing .env
      ansible.builtin.set_fact:
        frontend_port: "{{ _existing_frontend_port.stdout | trim }}"
      when: "deploy_frontend_vps | default(false) and (frontend_env_file.stat.exists | default(false))"

    # ── Create .env files (backend first, both ports now known) ───────────────

    - name: Create backend .env from template (only when missing)
      ansible.builtin.template:
        src: templates/strapi.env.j2
        dest: "{{ backend_path }}/.env"
        mode: "0644"
      when: not env_file.stat.exists

    - name: Ensure FRONTEND_PORT is in backend .env (re-deploys and idempotency)
      ansible.builtin.lineinfile:
        path: "{{ backend_path }}/.env"
        regexp: '^FRONTEND_PORT='
        line: "FRONTEND_PORT={{ frontend_port }}"
      when: deploy_frontend_vps | default(false)

    - name: Create frontend .env from template (only when missing)
      ansible.builtin.template:
        src: templates/frontend.env.j2
        dest: "{{ repo_dest }}/Frontend/.env"
        mode: "0644"
      when: "deploy_frontend_vps | default(false) and not (frontend_env_file.stat.exists | default(false))"

    # ── Start containers (all .env files exist, ports correctly wired) ────────

    - name: Build and start containers
      ansible.builtin.shell:
        cmd: "docker compose {{ '--profile full' if (deploy_frontend_vps | default(false)) else '' }} up -d --build"
        chdir: "{{ backend_path }}"
      register: compose_result
      changed_when: "'Started' in compose_result.stdout or 'Created' in compose_result.stdout or compose_result.rc != 0"

    # ── nginx + SSL (backend) ─────────────────────────────────────────────────

    - name: Install nginx and certbot
      ansible.builtin.apt:
        name:
          - nginx
          - certbot
          - python3-certbot-nginx
        state: present
        update_cache: true
      when: setup_nginx

    - name: Create nginx site config
      ansible.builtin.template:
        src: templates/nginx.conf.j2
        dest: "/etc/nginx/sites-available/{{ site_name }}"
        mode: "0644"
      when: setup_nginx
      notify: reload nginx

    - name: Enable nginx site
      ansible.builtin.file:
        src: "/etc/nginx/sites-available/{{ site_name }}"
        dest: "/etc/nginx/sites-enabled/{{ site_name }}"
        state: link
      when: setup_nginx
      notify: reload nginx

    - name: Ensure nginx is started
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true
      when: setup_nginx

    - name: Flush handlers before running certbot
      ansible.builtin.meta: flush_handlers

    - name: Obtain SSL certificate
      ansible.builtin.command:
        cmd: >
          certbot --nginx
          -d {{ domain_name }}
          --non-interactive
          --agree-tos
          -m {{ ssl_email }}
          --redirect
      when: setup_nginx and ssl_enabled
      register: certbot_result
      changed_when: "'Certificate not yet due for renewal' not in certbot_result.stdout"

    # ── nginx + SSL (frontend) ────────────────────────────────────────────────

    - name: Create nginx frontend config
      ansible.builtin.template:
        src: templates/nginx-frontend.conf.j2
        dest: "/etc/nginx/sites-available/{{ site_name }}-frontend"
        mode: "0644"
      when: deploy_frontend_vps | default(false) and setup_nginx
      notify: reload nginx

    - name: Enable nginx frontend site
      ansible.builtin.file:
        src: "/etc/nginx/sites-available/{{ site_name }}-frontend"
        dest: "/etc/nginx/sites-enabled/{{ site_name }}-frontend"
        state: link
      when: deploy_frontend_vps | default(false) and setup_nginx
      notify: reload nginx

    - name: Flush handlers before frontend certbot
      ansible.builtin.meta: flush_handlers
      when: deploy_frontend_vps | default(false)

    - name: Obtain SSL certificate for frontend
      ansible.builtin.command:
        cmd: >
          certbot --nginx
          -d {{ frontend_domain }}
          --non-interactive
          --agree-tos
          -m {{ ssl_email }}
          --redirect
      when: deploy_frontend_vps | default(false) and setup_nginx and ssl_enabled
      register: certbot_frontend_result
      changed_when: "'Certificate not yet due for renewal' not in certbot_frontend_result.stdout"
